# keycloak.conf — NEUTRAL, build-time platform config (ADR-0002). Baked into the AMI.
# Rendered by `kcimage configure`. Contains NO endpoints, hostnames, or secrets.
# __DB_VENDOR__ is substituted per-vendor at bake time (postgres|mysql, ADR-0003/0004).

db=__DB_VENDOR__

# Clustering: built-in JDBC_PING2 stack against the shared datasource (ADR-0009)
cache=ispn
cache-stack=jdbc-ping

# Observability (ADR-0009/0010)
health-enabled=true
metrics-enabled=true
log=console
log-console-output=json

# Reverse proxy: TLS terminates at the ALB; nodes serve plain HTTP (ADR-0009)
http-enabled=true
proxy-headers=xforwarded

# Compress static resources on the fly. Works around a stock-Keycloak bug where
# requests with 'Accept-Encoding: gzip' return 404 on admin-console CSS/JS, so the
# console won't load in a browser (keycloak/keycloak#31949, closed "not planned").
# Raw Quarkus property — Keycloak logs an "unsupported property" warning; harmless.
# Build-time, so it must be present here when `kc.sh build` runs.
quarkus.http.enable-compression=true
