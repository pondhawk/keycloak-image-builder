# fluent-bit.conf — opt-in centralized logging (ADR-0010).
# journald → CloudWatch Logs. Placeholders filled at boot/config.
# SKELETON: finalized in the Logging milestone.

[SERVICE]
    flush        5
    daemon       off
    log_level    info

[INPUT]
    Name         systemd
    Tag          keycloak.*
    Systemd_Filter  _SYSTEMD_UNIT=keycloak.service

[OUTPUT]
    Name             cloudwatch_logs
    Match            keycloak.*
    region           ${AWS_REGION}
    log_group_name   ${KDT_LOG_GROUP}
    log_stream_name  ${INSTANCE_ID}
    auto_create_group false
