name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats gettext-base jq
          SHFMT_VER=v3.10.0
          sudo curl -fsSL -o /usr/local/bin/shfmt \
            "https://github.com/mvdan/sh/releases/download/${SHFMT_VER}/shfmt_${SHFMT_VER}_linux_amd64"
          sudo chmod +x /usr/local/bin/shfmt
          shellcheck --version | head -2
          shfmt --version
          bats --version

      - name: ShellCheck + shfmt
        run: make check

      - name: Bats
        run: make test
