name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          # shfmt
          curl -fsSL -o /usr/local/bin/shfmt \
            https://github.com/mvdan/sh/releases/latest/download/shfmt_v3.10.0_linux_amd64 || true
          # bats
          sudo apt-get install -y bats

      - name: ShellCheck + shfmt
        run: make check

      - name: Bats
        run: make test
